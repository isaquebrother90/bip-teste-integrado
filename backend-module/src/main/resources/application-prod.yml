spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    com.bip: INFO
    org.hibernate.SQL: WARN
